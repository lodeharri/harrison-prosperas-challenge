# Reto Prosperas - Docker Compose Configuration
# Local development environment with LocalStack emulation

services:
  # ==========================================================================
  # LocalStack - AWS Service Emulation
  # ==========================================================================
  localstack:
    image: localstack/localstack:latest
    container_name: harrison-prosperas-localstack
    ports:
      - "4566:4566"  # LocalStack main port
    environment:
      - SERVICES=sqs,dynamodb,s3
      - DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - reto-network

  # ==========================================================================
  # Backend - FastAPI REST API
  # ==========================================================================
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: harrison-prosperas-api
    ports:
      - "8000:8000"
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_TABLE_JOBS=jobs
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/report-jobs-queue
      - SQS_DLQ_URL=http://localstack:4566/000000000000/report-jobs-dlq
      - SQS_PRIORITY_QUEUE_URL=http://localstack:4566/000000000000/report-jobs-priority
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=30
      - API_HOST=0.0.0.0
      - API_PORT=8000
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - reto-network

  # ==========================================================================
  # Worker - Async job processor
  # ==========================================================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: harrison-prosperas-worker
    command: ["python", "-m", "backend.worker.main"]
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_TABLE_JOBS=jobs
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/report-jobs-queue
      - SQS_DLQ_URL=http://localstack:4566/000000000000/report-jobs-dlq
      - SQS_PRIORITY_QUEUE_URL=http://localstack:4566/000000000000/report-jobs-priority
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      - JWT_ALGORITHM=HS256
      - WORKER_CONCURRENCY=2
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reto-network

# ==============================================================================
# Networks
# ==============================================================================
networks:
  reto-network:
    driver: bridge

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  localstack-data:
    driver: local

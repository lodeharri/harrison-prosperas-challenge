name: CI - Continuous Integration

on:
  push:
    branches:
      - '**'  # Todas las ramas
  pull_request:
    branches:
      - '**'  # Todos los PRs

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  CDK_APP_NAME: ${{ vars.CDK_APP_NAME || 'harrison-prosperas-challenge' }}
  STACK_PREFIX: ${{ vars.STACK_PREFIX || 'harrison' }}

jobs:
  # ============================================
  # Backend Jobs
  # ============================================

  lint-backend:
    name: Lint Backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check backend/src/

  typecheck-backend:
    name: Typecheck Backend (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install mypy boto3 pydantic pydantic-settings structlog aiobotocore

      - name: Run mypy type checker
        run: mypy backend/src/ --ignore-missing-imports

  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx aiobotocore

      - name: Run pytest with coverage
        run: pytest backend/tests/ -v --cov=backend/src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          name: backend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # Frontend Jobs
  # ============================================

  lint-frontend:
    name: Lint Frontend (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ env.CI_API_URL || 'http://localhost:8000' }}
      VITE_WS_URL: ${{ env.CI_WS_URL || 'ws://localhost:8000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 5

name: Deploy to AWS

on:
  push:
    branches: [master]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: harrison-prospera-challenge
  FRONTEND_BUCKET: harrison-frontend
  CDK_APP_NAME: harrison-prosperas-challenge

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # ============================================
  # Job 1: Build and push Docker to ECR
  # ============================================
  build-ecr:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)-${{ github.sha }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: Synth CDK to get API Gateway URL
  # ============================================
  cdk-synth:
    name: Synthesize CDK
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.cdk-outputs.outputs.api-url }}
      frontend-bucket: ${{ steps.cdk-outputs.outputs.frontend-bucket }}
      cloudfront-id: ${{ steps.cdk-outputs.outputs.cloudfront-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Synthesize CDK templates
        run: |
          cd infra
          npx cdk synth --quiet --all

      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          # Get API Gateway URL
          API_URL=$(cdk synth --quiet --all | grep -oP '(?<=Outputs:).*' | grep -oP '(?<=ApiEndpoint = ).[^\s]+' || echo "")
          if [ -z "$API_URL" ]; then
            # Try alternative extraction
            API_URL=$(cdk synth --quiet --all 2>/dev/null | grep -E "ApiEndpoint|ApiGateway" | head -1 | sed 's/.*= //' | tr -d '"' || echo "")
          fi
          echo "api-url=https://${API_URL#/}" >> $GITHUB_OUTPUT
          echo "frontend-bucket=${{ env.FRONTEND_BUCKET }}" >> $GITHUB_OUTPUT
          echo "cloudfront-id=${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_OUTPUT

  # ============================================
  # Job 3: Build frontend with correct API URL
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: cdk-synth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend with API URL
        env:
          VITE_API_URL: ${{ needs.cdk-synth.outputs.api-url }}/prod
          VITE_WS_URL: ${{ needs.cdk-synth.outputs.api-url }}/prod
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  # ============================================
  # Job 4: Deploy CDK infrastructure
  # ============================================
  deploy-cdk:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: [build-ecr, cdk-synth]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Bootstrap CDK
        if: vars.CDK_BOOTSTRAPPED != 'true'
        run: |
          cd infra
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Deploy CDK stacks
        run: |
          cd infra
          cdk deploy --all --require-approval never --concurrency 3
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ needs.build-ecr.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}

  # ============================================
  # Job 5: Upload frontend to S3
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-cdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Upload to S3
        run: |
          aws s3 sync ./dist s3://${{ env.FRONTEND_BUCKET }}/ --delete
          aws s3 cp ./dist/index.html s3://${{ env.FRONTEND_BUCKET }}/ --metadata-directive REPLACE

      - name: Invalidate CloudFront
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ============================================
  # Job 6: Verify deployment
  # ============================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-cdk, deploy-frontend]
    steps:
      - name: Wait for deployment stabilization
        run: sleep 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway URL
        id: api-endpoint
        run: |
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.CDK_APP_NAME }}-api-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text 2>/dev/null | tr -d 'https://')
          echo "api-id=$API_ID" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          API_URL="https://$(echo ${{ needs.deploy-cdk.outputs.api-url }})/prod/health"
          echo "Checking: $API_URL"
          curl -f -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "200"
        continue-on-error: true

      - name: Smoke test - Create job
        run: |
          API_URL="${{ needs.deploy-cdk.outputs.api-url }}/prod"
          
          # Login and get token
          TOKEN=$(curl -s -X POST "$API_URL/auth/token" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "test-user-001"}' | jq -r '.access_token')
          
          if [ "$TOKEN" != "null" ] && [ -n "$TOKEN" ]; then
            echo "✓ Authentication successful"
            
            # Create a test job
            JOB_RESPONSE=$(curl -s -X POST "$API_URL/jobs" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"report_type": "sales_report", "date_range": "last_7_days", "format": "pdf"}')
            
            JOB_ID=$(echo $JOB_RESPONSE | jq -r '.job_id')
            if [ "$JOB_ID" != "null" ] && [ -n "$JOB_ID" ]; then
              echo "✓ Job creation successful: $JOB_ID"
            else
              echo "Job response: $JOB_RESPONSE"
              exit 1
            fi
          else
            echo "✗ Authentication failed"
            exit 1
          fi

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **API Endpoint**: ${{ needs.deploy-cdk.outputs.api-url }}/prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend URL**: https://$(aws cloudfront get-distribution --id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --query 'Distribution.DomainName' --output text 2>/dev/null || echo ${{ env.FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com)" >> $GITHUB_STEP_SUMMARY
          echo "- **ECR Repository**: ${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest**: ${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

name: Deploy to AWS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY != '' && vars.ECR_REPOSITORY || 'harrison-prospera-challenge' }}
  FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET != '' && vars.FRONTEND_BUCKET || 'harrison-frontend' }}
  STACK_PREFIX: ${{ vars.STACK_PREFIX != '' && vars.STACK_PREFIX || 'harrison' }}

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  build-ecr:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository (if not exists)
        run: |
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }} \
            2>/dev/null || echo "Repository already exists"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)-${{ github.sha }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cdk-synth:
    name: Synthesize CDK
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.cdk-outputs.outputs.api-url }}
      alb-url: ${{ steps.cdk-outputs.outputs.alb-url }}
      cloudfront-id: ${{ steps.cdk-outputs.outputs.cloudfront-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          cd infra
          
          # Deploy with outputs file
          npx cdk deploy --all --require-approval never --outputs-file /tmp/cdk-outputs.json 2>/dev/null || true
          
          # Extract outputs from file
          API_URL=$(jq -r '."${{ env.STACK_PREFIX }}-api-stack".APIUrl // empty' /tmp/cdk-outputs.json 2>/dev/null || echo "")
          ALB_URL=$(jq -r '."${{ env.STACK_PREFIX }}-compute-stack".APIServiceUrl // empty' /tmp/cdk-outputs.json 2>/dev/null || echo "")
          CLOUDFRONT_ID=$(jq -r '."${{ env.STACK_PREFIX }}-cdn-stack".DistributionId // empty' /tmp/cdk-outputs.json 2>/dev/null || echo "")
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "alb-url=$ALB_URL" >> $GITHUB_OUTPUT
          echo "cloudfront-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: cdk-synth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend with API URLs
        env:
          VITE_API_URL: ${{ needs.cdk-synth.outputs.api-url }}
          VITE_WS_URL: ${{ needs.cdk-synth.outputs.alb-url }}
        run: |
          cd frontend
          export VITE_WS_URL=$(echo "$VITE_WS_URL" | sed 's|http://|ws://|')
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  deploy-cdk:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: [build-ecr, cdk-synth]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Bootstrap CDK (if needed)
        id: cdk-bootstrap
        run: |
          cd infra
          
          if [ "${{ vars.CDK_BOOTSTRAPPED }}" = "true" ]; then
            echo "CDK already bootstrapped"
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          else
            echo "Bootstrapping CDK..."
            npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          fi
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Deploy CDK stacks
        run: |
          cd infra
          npx cdk deploy --all --require-approval never \
            -c imageTag=${{ needs.build-ecr.outputs.image-tag }}
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          IMAGE_TAG: ${{ needs.build-ecr.outputs.image-tag }}
          ECR_REGISTRY: ${{ needs.build-ecr.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}

  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-cdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Upload to S3
        run: |
          aws s3 sync ./dist s3://${{ env.FRONTEND_BUCKET }}/ --delete

      - name: Get CloudFront Distribution ID
        id: get-cloudfront
        run: |
          CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-cdn-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$CLOUDFRONT_ID" ] && [ "$CLOUDFRONT_ID" != "None" ]; then
            echo "distribution-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          fi

      - name: Invalidate CloudFront
        if: steps.get-cloudfront.outputs.distribution-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.get-cloudfront.outputs.distribution-id }} \
            --paths "/*"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-cdk, deploy-frontend]
    steps:
      - name: Wait for deployment stabilization
        run: sleep 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway URL
        id: api-endpoint
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-api-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`APIUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health check
        id: health-check
        run: |
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "⚠️ Could not get API URL"
            echo "health-status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract base URL
          BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
          HEALTH_URL="$BASE_URL/health"
          
          echo "Testing health endpoint: $HEALTH_URL"
          
          STATUS_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$HEALTH_URL" 2>/dev/null || echo "error")
          
          if [ "$STATUS_CODE" = "200" ]; then
            echo "✅ Health check successful"
            echo "health-status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Health check failed: $STATUS_CODE"
            echo "health-status=unhealthy" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Smoke test
        id: smoke-test
        run: |
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "⚠️ Could not get API URL"
            echo "smoke-test-status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract base URL
          BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
          AUTH_URL="$BASE_URL/auth/token"
          
          echo "Testing authentication: $AUTH_URL"
          
          TOKEN_RESPONSE=$(curl -s -X POST "$AUTH_URL" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "github-actions-test"}' \
            --max-time 10 2>/dev/null || echo '{"error": "curl_failed"}')
          
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
          
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
            echo "✅ Authentication successful"
            echo "smoke-test-status=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ Authentication failed"
            echo "smoke-test-status=failed" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          HEALTH_STATUS="${{ steps.health-check.outputs.health-status || 'unknown' }}"
          SMOKE_TEST_STATUS="${{ steps.smoke-test.outputs.smoke-test-status || 'unknown' }}"
          
          echo "### 📊 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$HEALTH_STATUS" = "healthy" ]; then
            echo "✅ **Health Check**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "$HEALTH_STATUS" = "unhealthy" ]; then
            echo "⚠️ **Health Check**: WARNING" >> $GITHUB_STEP_SUMMARY
          else
            echo "➖ **Health Check**: $HEALTH_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$SMOKE_TEST_STATUS" = "passed" ]; then
            echo "✅ **Smoke Test**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "$SMOKE_TEST_STATUS" = "failed" ]; then
            echo "❌ **Smoke Test**: FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "➖ **Smoke Test**: $SMOKE_TEST_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resource URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          if [ -n "$API_URL" ] && [ "$API_URL" != "null" ]; then
            BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
            echo "- **API Base URL**: \`$BASE_URL\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Jobs Endpoint**: \`$API_URL\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Health Check**: \`$BASE_URL/health\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          ALB_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-compute-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`APIServiceUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$ALB_URL" ] && [ "$ALB_URL" != "None" ]; then
            WS_URL=$(echo "$ALB_URL" | sed 's|http://|ws://|')/ws
            echo "- **WebSocket URL**: \`$WS_URL\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          CLOUDFRONT_ID="${{ steps.get-cloudfront.outputs.distribution-id || '' }}"
          if [ -n "$CLOUDFRONT_ID" ]; then
            FRONTEND_DOMAIN=$(aws cloudfront get-distribution --id "$CLOUDFRONT_ID" --query 'Distribution.DomainName' --output text 2>/dev/null || echo "")
            if [ -n "$FRONTEND_DOMAIN" ]; then
              echo "- **Frontend URL**: https://$FRONTEND_DOMAIN" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 AWS Stacks Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **${{ env.STACK_PREFIX }}-data-stack** - DynamoDB + SQS" >> $GITHUB_STEP_SUMMARY
          echo "2. **${{ env.STACK_PREFIX }}-compute-stack** - ECS Fargate + ECR" >> $GITHUB_STEP_SUMMARY
          echo "3. **${{ env.STACK_PREFIX }}-api-stack** - API Gateway" >> $GITHUB_STEP_SUMMARY
          echo "4. **${{ env.STACK_PREFIX }}-cdn-stack** - S3 + CloudFront" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
name: Deploy to AWS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY != '' && vars.ECR_REPOSITORY || 'harrison-prospera-challenge' }}
  FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET != '' && vars.FRONTEND_BUCKET || 'harrison-frontend' }}
  STACK_PREFIX: ${{ vars.STACK_PREFIX != '' && vars.STACK_PREFIX || 'harrison' }}

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  build-ecr:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository (if not exists)
        run: |
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }} \
            2>/dev/null || echo "Repository already exists"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)-${{ github.sha }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-cdk:
    name: Validate CDK Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Synthesize CDK templates
        run: |
          cd infra
          npx cdk synth --all
          echo "✅ CDK templates synthesized successfully"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: deploy-cdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Get deployed URLs from CloudFormation
        id: get-urls
        run: |
          # Get API Gateway URL from API stack
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-api-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`APIUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          # Get WebSocket Secure URL from CDN stack
          WSS_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-cdn-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`WssUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")

          BASE_URL_API=$(echo "$API_URL" | sed 's|/jobs.*||')
          BASE_URL_WSS=$(echo "$WSS_URL" | sed 's|/ws/jobs.*||')
          
          echo "api-url=$BASE_URL_API" >> $GITHUB_OUTPUT
          echo "wss-url=$BASE_URL_WSS" >> $GITHUB_OUTPUT
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "❌ ERROR: Could not get API URL from CloudFormation"
            exit 1
          fi
          
          if [ -z "$WSS_URL" ] || [ "$WSS_URL" = "None" ]; then
            echo "❌ ERROR: Could not get WebSocket Secure URL from CloudFormation"
            exit 1
          fi
          
          echo "✅ Got API URL: $BASE_URL_API"
          echo "✅ Got WebSocket Secure URL: $BASE_URL_WSS"

      - name: Build frontend with API URLs
        env:
          VITE_API_URL: ${{ steps.get-urls.outputs.api-url }}
          VITE_WS_URL: ${{ steps.get-urls.outputs.wss-url }}
        run: |
          cd frontend
          echo "Building with VITE_API_URL=$VITE_API_URL"
          echo "Building with VITE_WS_URL=$VITE_WS_URL"
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  deploy-cdk:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: [build-ecr, validate-cdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Bootstrap CDK (if needed)
        id: cdk-bootstrap
        run: |
          cd infra
          
          if [ "${{ vars.CDK_BOOTSTRAPPED }}" = "true" ]; then
            echo "CDK already bootstrapped"
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          else
            echo "Bootstrapping CDK..."
            npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          fi
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Deploy CDK stacks
        run: |
          cd infra
          npx cdk deploy --all --require-approval never \
            -c imageTag=${{ needs.build-ecr.outputs.image-tag }}
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          IMAGE_TAG: ${{ needs.build-ecr.outputs.image-tag }}
          ECR_REGISTRY: ${{ needs.build-ecr.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}

  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-cdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Upload to S3
        run: |
          aws s3 sync ./dist s3://${{ env.FRONTEND_BUCKET }}/ --delete

      - name: Get CloudFront Distribution ID
        id: get-cloudfront
        run: |
          CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-cdn-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$CLOUDFRONT_ID" ] && [ "$CLOUDFRONT_ID" != "None" ]; then
            echo "distribution-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          fi

      - name: Invalidate CloudFront
        if: steps.get-cloudfront.outputs.distribution-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.get-cloudfront.outputs.distribution-id }} \
            --paths "/*"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-cdk, deploy-frontend]
    steps:
      - name: Wait for deployment stabilization
        run: sleep 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway URL
        id: api-endpoint
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-api-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`APIUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health check
        id: health-check
        run: |
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "⚠️ Could not get API URL"
            echo "health-status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract base URL
          BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
          HEALTH_URL="$BASE_URL/health"
          
          echo "Testing health endpoint: $HEALTH_URL"
          
          STATUS_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$HEALTH_URL" 2>/dev/null || echo "error")
          
          if [ "$STATUS_CODE" = "200" ]; then
            echo "✅ Health check successful"
            echo "health-status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Health check failed: $STATUS_CODE"
            echo "health-status=unhealthy" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Smoke test
        id: smoke-test
        run: |
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "⚠️ Could not get API URL"
            echo "smoke-test-status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract base URL
          BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
          AUTH_URL="$BASE_URL/auth/token"
          
          echo "Testing authentication: $AUTH_URL"
          
          TOKEN_RESPONSE=$(curl -s -X POST "$AUTH_URL" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "github-actions-test"}' \
            --max-time 10 2>/dev/null || echo '{"error": "curl_failed"}')
          
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
          
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
            echo "✅ Authentication successful"
            echo "smoke-test-status=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ Authentication failed"
            echo "smoke-test-status=failed" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Show Deployment URLs
        run: |
          echo ""
          echo "## 🚀 Deployment Complete!"
          echo ""
          echo "### 🌐 Frontend URL (CloudFront)"
          echo ""
          
          # First try to get frontend URL from CloudFormation outputs
          FRONTEND_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-cdn-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionDomainName`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          # If CloudFormation output fails, fall back to CloudFront API
          if [ -z "$FRONTEND_DOMAIN" ] || [ "$FRONTEND_DOMAIN" = "None" ]; then
            CLOUDFRONT_ID="${{ steps.get-cloudfront.outputs.distribution-id || '' }}"
            if [ -n "$CLOUDFRONT_ID" ]; then
              FRONTEND_DOMAIN=$(aws cloudfront get-distribution --id "$CLOUDFRONT_ID" --query 'Distribution.DomainName' --output text 2>/dev/null || echo "")
            fi
          fi
          
          if [ -n "$FRONTEND_DOMAIN" ] && [ "$FRONTEND_DOMAIN" != "None" ]; then
            FRONTEND_URL="https://$FRONTEND_DOMAIN"
            echo "- **URL**: \`$FRONTEND_URL\`"
            echo "- **Direct link**: $FRONTEND_URL"
          else
            echo "- **Status**: Could not retrieve frontend URL"
          fi
          
          echo ""
          echo "### 🔗 Backend API URL"
          echo ""
          
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          if [ -n "$API_URL" ] && [ "$API_URL" != "null" ]; then
            BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
            echo "- **URL**: \`$BASE_URL\`"
          fi
          
          echo ""
          echo "---"
          echo ""

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          HEALTH_STATUS="${{ steps.health-check.outputs.health-status || 'unknown' }}"
          SMOKE_TEST_STATUS="${{ steps.smoke-test.outputs.smoke-test-status || 'unknown' }}"
          
          echo "### 📊 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$HEALTH_STATUS" = "healthy" ]; then
            echo "✅ **Health Check**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "$HEALTH_STATUS" = "unhealthy" ]; then
            echo "⚠️ **Health Check**: WARNING" >> $GITHUB_STEP_SUMMARY
          else
            echo "➖ **Health Check**: $HEALTH_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$SMOKE_TEST_STATUS" = "passed" ]; then
            echo "✅ **Smoke Test**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "$SMOKE_TEST_STATUS" = "failed" ]; then
            echo "❌ **Smoke Test**: FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "➖ **Smoke Test**: $SMOKE_TEST_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Frontend URL (CloudFront)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          CLOUDFRONT_ID="${{ steps.get-cloudfront.outputs.distribution-id || '' }}"
          if [ -n "$CLOUDFRONT_ID" ]; then
            FRONTEND_DOMAIN=$(aws cloudfront get-distribution --id "$CLOUDFRONT_ID" --query 'Distribution.DomainName' --output text 2>/dev/null || echo "")
            if [ -n "$FRONTEND_DOMAIN" ]; then
              FRONTEND_URL="https://$FRONTEND_DOMAIN"
              echo "- **URL**: \`$FRONTEND_URL\`" >> $GITHUB_STEP_SUMMARY
              echo "- **Direct link**: [$FRONTEND_URL]($FRONTEND_URL)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Backend API URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          if [ -n "$API_URL" ] && [ "$API_URL" != "null" ]; then
            BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
            echo "- **URL**: \`$BASE_URL\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 AWS Stacks Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **${{ env.STACK_PREFIX }}-data-stack** - DynamoDB + SQS" >> $GITHUB_STEP_SUMMARY
          echo "2. **${{ env.STACK_PREFIX }}-compute-stack** - ECS Fargate + ECR" >> $GITHUB_STEP_SUMMARY
          echo "3. **${{ env.STACK_PREFIX }}-api-stack** - API Gateway" >> $GITHUB_STEP_SUMMARY
          echo "4. **${{ env.STACK_PREFIX }}-cdn-stack** - S3 + CloudFront" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
name: Deploy to AWS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY != '' && vars.ECR_REPOSITORY || 'harrison-prospera-challenge' }}
  FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET != '' && vars.FRONTEND_BUCKET || 'harrison-frontend' }}
  CDK_APP_NAME: ${{ vars.CDK_APP_NAME != '' && vars.CDK_APP_NAME || 'harrison-prosperas-challenge' }}
  STACK_PREFIX: ${{ vars.STACK_PREFIX != '' && vars.STACK_PREFIX || 'harrison' }}

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # ============================================
  # Job 0: Pre-deployment checks
  # ============================================
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      checks-passed: ${{ steps.check-secrets.outputs.all-secrets-present }}
    steps:
      - name: Check required secrets
        id: check-secrets
        run: |
          echo "Checking required GitHub secrets..."
          
          REQUIRED_SECRETS=(
            "AWS_ACCESS_KEY_ID"
            "AWS_SECRET_ACCESS_KEY"
            "AWS_ACCOUNT_ID"
            "JWT_SECRET_KEY"
          )
          
          ALL_PRESENT="true"
          
          # Check each secret individually
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ Missing secret: AWS_ACCESS_KEY_ID"
            ALL_PRESENT="false"
          else
            echo "✅ Secret present: AWS_ACCESS_KEY_ID"
          fi
          
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ Missing secret: AWS_SECRET_ACCESS_KEY"
            ALL_PRESENT="false"
          else
            echo "✅ Secret present: AWS_SECRET_ACCESS_KEY"
          fi
          
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "❌ Missing secret: AWS_ACCOUNT_ID"
            ALL_PRESENT="false"
          else
            echo "✅ Secret present: AWS_ACCOUNT_ID"
          fi
          
          if [ -z "${{ secrets.JWT_SECRET_KEY }}" ]; then
            echo "❌ Missing secret: JWT_SECRET_KEY"
            ALL_PRESENT="false"
          else
            echo "✅ Secret present: JWT_SECRET_KEY"
          fi
          
          if [ "$ALL_PRESENT" = "false" ]; then
            echo "::error::Missing required secrets. Please configure all secrets in GitHub repository settings."
            echo "all-secrets-present=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ All required secrets are present"
            echo "all-secrets-present=true" >> $GITHUB_OUTPUT
          fi
          
          echo ""
          echo "Checking GitHub variables..."
          
          # Check CDK_BOOTSTRAPPED variable
          if [ -z "${{ vars.CDK_BOOTSTRAPPED }}" ]; then
            echo "⚠️ Variable CDK_BOOTSTRAPPED is not set. It will be created during deployment."
          else
            echo "✅ Variable CDK_BOOTSTRAPPED: ${{ vars.CDK_BOOTSTRAPPED }}"
          fi
          
          # Check CLOUDFRONT_DISTRIBUTION_ID variable (optional)
          if [ -z "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "ℹ️ Variable CLOUDFRONT_DISTRIBUTION_ID is not set. It will be created during deployment."
          else
            echo "✅ Variable CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          fi
          
          # Set output
          echo "all-secrets-present=$ALL_PRESENT" >> $GITHUB_OUTPUT

  # ============================================
  # Job 1: Build and push Docker to ECR
  # ============================================
  build-ecr:
    needs: pre-deploy-checks
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository (if not exists)
        run: |
          # Create ECR repository if it doesn't exist
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }} \
            2>/dev/null || echo "Repository already exists"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)-${{ github.sha }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: Synth CDK to get API Gateway URL
  # ============================================
  cdk-synth:
    name: Synthesize CDK
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    outputs:
      api-url: ${{ steps.cdk-outputs.outputs.api-url }}
      frontend-bucket: ${{ steps.cdk-outputs.outputs.frontend-bucket }}
      cloudfront-id: ${{ steps.cdk-outputs.outputs.cloudfront-id }}
      websocket-url: ${{ steps.cdk-outputs.outputs.websocket-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Synthesize CDK templates
        run: |
          cd infra
          npx cdk synth --quiet --all

      - name: Get CDK outputs (robust extraction)
        id: cdk-outputs
        run: |
          echo "Getting CDK outputs using robust methods..."
          
          # Method 1: Try to get outputs from synthesized templates (most reliable)
          echo "Method 1: Extracting from synthesized templates..."
          
          # Synthesize API stack and extract API URL
          API_URL=""
          CLOUDFRONT_ID=""
          
          # Create temporary directory for synthesis
          mkdir -p /tmp/cdk-synth
          
          # Synthesize API stack
          if cdk synth ${{ env.STACK_PREFIX }}-api-stack --quiet --output /tmp/cdk-synth 2>/dev/null; then
            # Look for APIUrl output in the synthesized template
            API_URL=$(grep -r '"APIUrl"' /tmp/cdk-synth/*.template.json 2>/dev/null | \
              grep -A 5 '"Value"' | grep '"Value"' | \
              sed 's/.*"Value": "//' | sed 's/".*//' | head -1 || echo "")
            
            # If not found, try APIGatewayEndpoint
            if [ -z "$API_URL" ]; then
              API_URL=$(grep -r '"APIGatewayEndpoint"' /tmp/cdk-synth/*.template.json 2>/dev/null | \
                grep -A 5 '"Value"' | grep '"Value"' | \
                sed 's/.*"Value": "//' | sed 's/".*//' | head -1 || echo "")
            fi
          fi
          
          # Synthesize CDN stack for CloudFront ID
          if cdk synth ${{ env.STACK_PREFIX }}-cdn-stack --quiet --output /tmp/cdk-synth 2>/dev/null; then
            # Look for CloudFrontDistributionId output
            CLOUDFRONT_ID=$(grep -r '"CloudFrontDistributionId"' /tmp/cdk-synth/*.template.json 2>/dev/null | \
              grep -A 5 '"Value"' | grep '"Value"' | \
              sed 's/.*"Value": "//' | sed 's/".*//' | head -1 || echo "")
            
            # If not found, try to extract from distribution properties
            if [ -z "$CLOUDFRONT_ID" ]; then
              CLOUDFRONT_ID=$(grep -r '"Distribution"' /tmp/cdk-synth/*.template.json 2>/dev/null | \
                grep -A 2 '"Ref"' | grep '"Ref"' | \
                sed 's/.*"Ref": "//' | sed 's/".*//' | head -1 || echo "")
            fi
          fi
          
          # Method 2: Try cdk list if synthesis fails
          if [ -z "$API_URL" ] || [ -z "$CLOUDFRONT_ID" ]; then
            echo "Method 2: Trying cdk list..."
            if cdk list --all --outputs-file /tmp/cdk-outputs.json 2>/dev/null; then
              if [ -f /tmp/cdk-outputs.json ]; then
                API_URL=$(jq -r '.[]."${{ env.STACK_PREFIX }}-api-stack".APIUrl // empty' /tmp/cdk-outputs.json 2>/dev/null || echo "")
                CLOUDFRONT_ID=$(jq -r '.[]."${{ env.STACK_PREFIX }}-cdn-stack".CloudFrontDistributionId // empty' /tmp/cdk-outputs.json 2>/dev/null || echo "")
              fi
            fi
          fi
          
          # Method 3: Fallback to hardcoded patterns
          if [ -z "$API_URL" ]; then
            echo "Method 3: Using fallback pattern for API URL..."
            # API Gateway URL pattern: https://{api-id}.execute-api.{region}.amazonaws.com/prod
            API_URL="https://{api-id}.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod/jobs"
          fi
          
          if [ -z "$CLOUDFRONT_ID" ]; then
            echo "Method 3: Using fallback for CloudFront ID..."
            CLOUDFRONT_ID=""
          fi
          
          # Ensure API URL starts with https:// and has correct format
          if [[ -n "$API_URL" ]]; then
            if [[ ! "$API_URL" =~ ^https:// ]]; then
              API_URL="https://$API_URL"
            fi
            
            # Remove any trailing slashes
            API_URL=$(echo "$API_URL" | sed 's|/$||')
          fi
          
          # Generate WebSocket URL from API URL
          WEBSOCKET_URL=""
          if [[ -n "$API_URL" ]]; then
            # Extract base URL (remove /jobs suffix if present)
            BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||' | sed 's|/prod.*||')
            
            # Convert https:// to wss:// and add /prod/ws
            # API Gateway WebSocket URL format: wss://{api-id}.execute-api.{region}.amazonaws.com/prod
            WEBSOCKET_URL=$(echo "$BASE_URL" | sed 's|https://|wss://|')
            
            # Ensure we have the /prod stage
            if [[ ! "$WEBSOCKET_URL" =~ /prod$ ]]; then
              WEBSOCKET_URL="$WEBSOCKET_URL/prod"
            fi
            
            # Add /ws path for WebSocket connections
            WEBSOCKET_URL="$WEBSOCKET_URL/ws"
          fi
          
          echo "=== CDK Outputs ==="
          echo "API URL: $API_URL"
          echo "WebSocket URL: $WEBSOCKET_URL"
          echo "CloudFront ID: $CLOUDFRONT_ID"
          echo "=================="
          
          # Set outputs
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend-bucket=${{ env.FRONTEND_BUCKET }}" >> $GITHUB_OUTPUT
          echo "cloudfront-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          echo "websocket-url=$WEBSOCKET_URL" >> $GITHUB_OUTPUT

  # ============================================
  # Job 3: Build frontend with correct API URL
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: cdk-synth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend with API URL
        env:
          VITE_API_URL: ${{ needs.cdk-synth.outputs.api-url }}
          VITE_WS_URL: ${{ needs.cdk-synth.outputs.websocket-url }}
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  # ============================================
  # Job 4: Deploy CDK infrastructure
  # ============================================
  deploy-cdk:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: [build-ecr, cdk-synth]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Bootstrap CDK (if needed)
        id: cdk-bootstrap
        run: |
          cd infra
          
          # Check if CDK is already bootstrapped using the GitHub variable
          if [ "${{ vars.CDK_BOOTSTRAPPED }}" = "true" ]; then
            echo "CDK already bootstrapped (based on CDK_BOOTSTRAPPED variable)"
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          else
            echo "CDK_BOOTSTRAPPED is false or not set, checking bootstrap status..."
            
            # Check if CDK is actually bootstrapped by trying to list stacks
            if npx cdk list --all 2>/dev/null; then
              echo "CDK is already bootstrapped (verified with cdk list)"
              echo "bootstrapped=true" >> $GITHUB_OUTPUT
              
              # Try to update the GitHub variable for future runs (may fail due to permissions)
              echo "Attempting to update CDK_BOOTSTRAPPED variable to true..."
              gh variable set CDK_BOOTSTRAPPED --body "true" || echo "⚠️ Could not update CDK_BOOTSTRAPPED variable (permissions issue). Continuing anyway."
            else
              echo "CDK not bootstrapped. Bootstrapping now..."
              
              # Bootstrap CDK
              npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}
              
              # Verify bootstrap succeeded
              if npx cdk list --all 2>/dev/null; then
                echo "CDK bootstrap successful"
                echo "bootstrapped=true" >> $GITHUB_OUTPUT
                
                # Try to update the GitHub variable (may fail due to permissions)
                echo "Attempting to update CDK_BOOTSTRAPPED variable to true..."
                gh variable set CDK_BOOTSTRAPPED --body "true" || echo "⚠️ Could not update CDK_BOOTSTRAPPED variable (permissions issue). Continuing anyway."
              else
                echo "ERROR: CDK bootstrap failed"
                echo "bootstrapped=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            fi
          fi
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy CDK stacks
        run: |
          cd infra
          # Pass imageTag context to CDK for ECR image reference
          npx cdk deploy --all --require-approval never --concurrency 3 \
            -c imageTag=${{ needs.build-ecr.outputs.image-tag }}
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          IMAGE_TAG: ${{ needs.build-ecr.outputs.image-tag }}
          ECR_REGISTRY: ${{ needs.build-ecr.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}

  # ============================================
  # Job 5: Upload frontend to S3
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-cdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Upload to S3
        run: |
          aws s3 sync ./dist s3://${{ env.FRONTEND_BUCKET }}/ --delete
          aws s3 cp ./dist/index.html s3://${{ env.FRONTEND_BUCKET }}/ --metadata-directive REPLACE

      - name: Get CloudFront Distribution ID and update variable
        id: get-cloudfront
        run: |
          echo "Getting CloudFront Distribution ID from CloudFormation outputs..."
          
          # Method 1: Try to get CloudFront ID from CDN stack outputs
          CLOUDFRONT_ID=""
          
          # Wait a moment for CloudFormation to be ready
          sleep 10
          
          # Try multiple output names
          for OUTPUT_KEY in "CloudFrontDistributionId" "DistributionId" "FrontendDistributionId"; do
            if [ -z "$CLOUDFRONT_ID" ]; then
              CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
                --stack-name ${{ env.STACK_PREFIX }}-cdn-stack \
                --query "Stacks[0].Outputs[?OutputKey=='$OUTPUT_KEY'].OutputValue" \
                --output text 2>/dev/null || echo "")
              
              if [ -n "$CLOUDFRONT_ID" ] && [ "$CLOUDFRONT_ID" != "None" ]; then
                echo "Found CloudFront ID using output key: $OUTPUT_KEY"
                break
              fi
            fi
          done
          
          # Method 2: Try to get from CloudFront API directly
          if [ -z "$CLOUDFRONT_ID" ] || [ "$CLOUDFRONT_ID" = "None" ]; then
            echo "Method 2: Trying CloudFront API..."
            CLOUDFRONT_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?Comment=='${{ env.STACK_PREFIX }}-frontend-cdn'].Id" \
              --output text 2>/dev/null || echo "")
          fi
          
          # Method 3: Try to extract from stack resources
          if [ -z "$CLOUDFRONT_ID" ] || [ "$CLOUDFRONT_ID" = "None" ]; then
            echo "Method 3: Extracting from stack resources..."
            CLOUDFRONT_ID=$(aws cloudformation describe-stack-resources \
              --stack-name ${{ env.STACK_PREFIX }}-cdn-stack \
              --query "StackResources[?ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId" \
              --output text 2>/dev/null || echo "")
          fi
          
          if [ -n "$CLOUDFRONT_ID" ] && [ "$CLOUDFRONT_ID" != "None" ]; then
            echo "✅ CloudFront Distribution ID: $CLOUDFRONT_ID"
            echo "distribution-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
            
            # Update GitHub variable
            echo "Updating CLOUDFRONT_DISTRIBUTION_ID GitHub variable..."
            
            # Check current value
            CURRENT_VAR="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
            
            if [ -z "$CURRENT_VAR" ] || [ "$CLOUDFRONT_ID" != "$CURRENT_VAR" ]; then
              echo "Setting CLOUDFRONT_DISTRIBUTION_ID to: $CLOUDFRONT_ID"
              gh variable set CLOUDFRONT_DISTRIBUTION_ID --body "$CLOUDFRONT_ID"
            else
              echo "CLOUDFRONT_DISTRIBUTION_ID already set to correct value"
            fi
            
            # Also update as environment variable for this workflow
            echo "CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_ID" >> $GITHUB_ENV
            
          else
            echo "⚠️ Warning: Could not get CloudFront Distribution ID"
            echo "distribution-id=" >> $GITHUB_OUTPUT
          fi

      - name: Invalidate CloudFront
        if: steps.get-cloudfront.outputs.distribution-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.get-cloudfront.outputs.distribution-id }} \
            --paths "/*"

  # ============================================
  # Job 6: Verify deployment
  # ============================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-cdk, deploy-frontend]
    steps:
      - name: Wait for deployment stabilization
        run: sleep 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway URL from CloudFormation
        id: api-endpoint
        run: |
          # Get API URL from CloudFormation outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-api-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`APIUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$API_URL" ]; then
            # Try alternative output name
            API_URL=$(aws cloudformation describe-stacks \
              --stack-name ${{ env.STACK_PREFIX }}-api-stack \
              --query 'Stacks[0].Outputs[?OutputKey==`APIGatewayEndpoint`].OutputValue' \
              --output text 2>/dev/null || echo "")
          fi
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health check (robust)
        id: health-check
        run: |
          echo "Starting health check..."
          
          # Get API URL from the api-endpoint step
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "⚠️ Warning: Could not get API URL from CloudFormation outputs"
            echo "Skipping health check..."
            echo "health-status=skipped" >> $GITHUB_OUTPUT
            exit 0  # Don't fail, just skip
          fi
          
          echo "API URL from CloudFormation: $API_URL"
          
          # Determine the correct health endpoint
          # The API URL might be in different formats:
          # 1. https://{api-id}.execute-api.{region}.amazonaws.com/prod/jobs
          # 2. https://{api-id}.execute-api.{region}.amazonaws.com/prod
          # 3. Just the base URL
          
          # Extract base URL (remove /jobs suffix if present)
          BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
          
          # Try different health endpoint patterns
          HEALTH_ENDPOINTS=(
            "$BASE_URL/health"           # Direct health endpoint
            "$BASE_URL/prod/health"      # With /prod stage
            "${BASE_URL%/prod}/health"   # Remove /prod if present
          )
          
          HEALTH_STATUS="unknown"
          FINAL_HEALTH_URL=""
          
          for HEALTH_URL in "${HEALTH_ENDPOINTS[@]}"; do
            echo "Trying health endpoint: $HEALTH_URL"
            
            # Try with timeout and follow redirects
            STATUS_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              --retry 2 \
              --retry-delay 1 \
              --retry-max-time 30 \
              "$HEALTH_URL" 2>/dev/null || echo "curl_error")
            
            if [ "$STATUS_CODE" = "curl_error" ]; then
              echo "  → Connection failed"
              continue
            fi
            
            echo "  → Status code: $STATUS_CODE"
            
            if [ "$STATUS_CODE" = "200" ]; then
              echo "✅ Health check successful!"
              HEALTH_STATUS="healthy"
              FINAL_HEALTH_URL="$HEALTH_URL"
              break
            elif [[ "$STATUS_CODE" =~ ^[45][0-9][0-9]$ ]]; then
              echo "  → HTTP error: $STATUS_CODE"
              # Try to get error details
              ERROR_DETAILS=$(curl -s --max-time 5 "$HEALTH_URL" 2>/dev/null | head -c 200 || echo "")
              if [ -n "$ERROR_DETAILS" ]; then
                echo "  → Error details: $ERROR_DETAILS"
              fi
            fi
          done
          
          if [ "$HEALTH_STATUS" != "healthy" ]; then
            echo "⚠️ Warning: Health check failed for all endpoints"
            echo "Health check will continue (non-blocking)..."
            HEALTH_STATUS="unhealthy"
          fi
          
          echo "health-status=$HEALTH_STATUS" >> $GITHUB_OUTPUT
          if [ -n "$FINAL_HEALTH_URL" ]; then
            echo "health-url=$FINAL_HEALTH_URL" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Smoke test - Create job (robust)
        id: smoke-test
        run: |
          echo "Starting smoke test..."
          
          # Get API URL from the api-endpoint step
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "⚠️ Warning: Could not get API URL from CloudFormation outputs"
            echo "Skipping smoke test..."
            echo "smoke-test-status=skipped" >> $GITHUB_OUTPUT
            exit 0  # Don't fail, just skip
          fi
          
          echo "API URL for smoke test: $API_URL"
          
          # Determine the correct base URL for API calls
          # The API URL might be the full /jobs endpoint or just the base
          if [[ "$API_URL" =~ /jobs$ ]]; then
            # Remove /jobs suffix to get base URL
            BASE_URL=$(echo "$API_URL" | sed 's|/jobs$||')
          else
            BASE_URL="$API_URL"
          fi
          
          # Ensure we have the /prod stage
          if [[ ! "$BASE_URL" =~ /prod$ ]]; then
            # Check if it already has a stage
            if [[ "$BASE_URL" =~ /[a-zA-Z0-9]+$ ]]; then
              # Already has a stage, use as-is
              API_BASE_URL="$BASE_URL"
            else
              # Add /prod stage
              API_BASE_URL="$BASE_URL/prod"
            fi
          else
            API_BASE_URL="$BASE_URL"
          fi
          
          echo "Using API base URL: $API_BASE_URL"
          
          # Test 1: Authentication
          echo "Test 1: Authentication..."
          AUTH_URL="$API_BASE_URL/auth/token"
          echo "  Calling: $AUTH_URL"
          
          TOKEN=""
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "  Attempt $i of $MAX_RETRIES..."
            
            TOKEN_RESPONSE=$(curl -s -X POST "$AUTH_URL" \
              -H "Content-Type: application/json" \
              -d '{"user_id": "github-actions-test-001"}' \
              --max-time 10 \
              --retry 2 \
              --retry-delay 1 2>/dev/null || echo '{"error": "curl_failed"}')
            
            if echo "$TOKEN_RESPONSE" | grep -q "curl_failed"; then
              echo "  → Connection failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              continue
            fi
            
            TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
            
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              echo "  ✅ Authentication successful"
              break
            else
              echo "  → Authentication failed, response: $TOKEN_RESPONSE"
              if [ $i -lt $MAX_RETRIES ]; then
                echo "  Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              fi
            fi
          done
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "❌ Smoke test failed: Authentication unsuccessful after $MAX_RETRIES attempts"
            echo "smoke-test-status=failed" >> $GITHUB_OUTPUT
            exit 0  # Don't fail the entire job, just report failure
          fi
          
          # Test 2: Create a job
          echo ""
          echo "Test 2: Create a job..."
          CREATE_JOB_URL="$API_BASE_URL/jobs"
          echo "  Calling: $CREATE_JOB_URL"
          
          JOB_RESPONSE=$(curl -s -X POST "$CREATE_JOB_URL" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"report_type": "sales_report", "date_range": "last_7_days", "format": "pdf", "priority": "standard"}' \
            --max-time 15 \
            --retry 2 \
            --retry-delay 1 2>/dev/null || echo '{"error": "curl_failed"}')
          
          if echo "$JOB_RESPONSE" | grep -q "curl_failed"; then
            echo "  ❌ Job creation failed: Connection error"
            echo "smoke-test-status=partial" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          JOB_ID=$(echo "$JOB_RESPONSE" | jq -r '.job_id // empty')
          ERROR=$(echo "$JOB_RESPONSE" | jq -r '.error // empty')
          
          if [ -n "$JOB_ID" ] && [ "$JOB_ID" != "null" ]; then
            echo "  ✅ Job creation successful: $JOB_ID"
            echo "smoke-test-status=passed" >> $GITHUB_OUTPUT
            echo "test-job-id=$JOB_ID" >> $GITHUB_OUTPUT
          elif [ -n "$ERROR" ]; then
            echo "  ⚠️ Job creation returned error: $ERROR"
            echo "  Full response: $JOB_RESPONSE"
            echo "smoke-test-status=partial" >> $GITHUB_OUTPUT
          else
            echo "  ❌ Job creation failed: No job_id in response"
            echo "  Full response: $JOB_RESPONSE"
            echo "smoke-test-status=failed" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get test results
          HEALTH_STATUS="${{ steps.health-check.outputs.health-status || 'unknown' }}"
          SMOKE_TEST_STATUS="${{ steps.smoke-test.outputs.smoke-test-status || 'unknown' }}"
          TEST_JOB_ID="${{ steps.smoke-test.outputs.test-job-id || '' }}"
          
          echo "### 📊 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Health check status
          if [ "$HEALTH_STATUS" = "healthy" ]; then
            echo "✅ **Health Check**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "$HEALTH_STATUS" = "unhealthy" ]; then
            echo "⚠️ **Health Check**: WARNING (service may be starting)" >> $GITHUB_STEP_SUMMARY
          elif [ "$HEALTH_STATUS" = "skipped" ]; then
            echo "➖ **Health Check**: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❓ **Health Check**: $HEALTH_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Smoke test status
          if [ "$SMOKE_TEST_STATUS" = "passed" ]; then
            echo "✅ **Smoke Test**: PASSED" >> $GITHUB_STEP_SUMMARY
            if [ -n "$TEST_JOB_ID" ]; then
              echo "   - Test Job ID: \`$TEST_JOB_ID\`" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$SMOKE_TEST_STATUS" = "partial" ]; then
            echo "⚠️ **Smoke Test**: PARTIAL (authentication worked, job creation had issues)" >> $GITHUB_STEP_SUMMARY
          elif [ "$SMOKE_TEST_STATUS" = "failed" ]; then
            echo "❌ **Smoke Test**: FAILED" >> $GITHUB_STEP_SUMMARY
          elif [ "$SMOKE_TEST_STATUS" = "skipped" ]; then
            echo "➖ **Smoke Test**: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❓ **Smoke Test**: $SMOKE_TEST_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resource URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get API URL from the api-endpoint step
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          if [ -n "$API_URL" ] && [ "$API_URL" != "null" ]; then
            # Extract base URL from the API URL
            BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||' | sed 's|/prod.*||')
            echo "- **API Base URL**: \`$BASE_URL/prod\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Jobs Endpoint**: \`$API_URL\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Health Check**: \`$BASE_URL/prod/health\`" >> $GITHUB_STEP_SUMMARY
            
            # WebSocket URL
            WEBSOCKET_URL=$(echo "$BASE_URL" | sed 's|https://|wss://|')/prod/ws
            echo "- **WebSocket URL**: \`$WEBSOCKET_URL\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **API URL**: Could not retrieve from CloudFormation" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Frontend URL
          CLOUDFRONT_ID="${{ steps.get-cloudfront.outputs.distribution-id || vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -n "$CLOUDFRONT_ID" ] && [ "$CLOUDFRONT_ID" != "null" ]; then
            FRONTEND_DOMAIN=$(aws cloudfront get-distribution --id "$CLOUDFRONT_ID" --query 'Distribution.DomainName' --output text 2>/dev/null || echo "")
            if [ -n "$FRONTEND_DOMAIN" ]; then
              echo "- **Frontend URL**: https://$FRONTEND_DOMAIN" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **Frontend URL**: CloudFront distribution \`$CLOUDFRONT_ID\`" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **Frontend URL**: ${{ env.FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **ECR Repository**: \`${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Tag**: \`${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit Tag**: \`${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Tag**: \`${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-ecr.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 AWS Stacks Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **${{ env.STACK_PREFIX }}-data-stack** - DynamoDB + SQS" >> $GITHUB_STEP_SUMMARY
          echo "2. **${{ env.STACK_PREFIX }}-compute-stack** - App Runner + ECR" >> $GITHUB_STEP_SUMMARY
          echo "3. **${{ env.STACK_PREFIX }}-api-stack** - API Gateway + Rate Limiting" >> $GITHUB_STEP_SUMMARY
          echo "4. **${{ env.STACK_PREFIX }}-cdn-stack** - S3 + CloudFront" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚙️ Environment Variables Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check which variables were updated
          CDK_BOOTSTRAPPED_UPDATED="${{ steps.cdk-bootstrap.outputs.bootstrapped == 'true' && vars.CDK_BOOTSTRAPPED != 'true' && '✅' || '➖' }}"
          CLOUDFRONT_ID_UPDATED="${{ steps.get-cloudfront.outputs.distribution-id != '' && vars.CLOUDFRONT_DISTRIBUTION_ID != steps.get-cloudfront.outputs.distribution-id && '✅' || '➖' }}"
          
          echo "- $CDK_BOOTSTRAPPED_UPDATED **CDK_BOOTSTRAPPED**: \`true\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "$CLOUDFRONT_ID" ] && [ "$CLOUDFRONT_ID" != "null" ]; then
            echo "- $CLOUDFRONT_ID_UPDATED **CLOUDFRONT_DISTRIBUTION_ID**: \`$CLOUDFRONT_ID\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ➖ **CLOUDFRONT_DISTRIBUTION_ID**: Not set" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

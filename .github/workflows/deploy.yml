name: Deploy to AWS

on:
  push:
    branches: [master]

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY != '' && vars.ECR_REPOSITORY || 'harrison-prospera-challenge' }}
  FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET != '' && vars.FRONTEND_BUCKET || 'harrison-frontend' }}
  CDK_APP_NAME: ${{ vars.CDK_APP_NAME != '' && vars.CDK_APP_NAME || 'harrison-prosperas-challenge' }}
  STACK_PREFIX: ${{ vars.STACK_PREFIX != '' && vars.STACK_PREFIX || 'harrison' }}

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # ============================================
  # Job 1: Build and push Docker to ECR
  # ============================================
  build-ecr:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository (if not exists)
        run: |
          # Create ECR repository if it doesn't exist
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }} \
            2>/dev/null || echo "Repository already exists"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)-${{ github.sha }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: Synth CDK to get API Gateway URL
  # ============================================
  cdk-synth:
    name: Synthesize CDK
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.cdk-outputs.outputs.api-url }}
      frontend-bucket: ${{ steps.cdk-outputs.outputs.frontend-bucket }}
      cloudfront-id: ${{ steps.cdk-outputs.outputs.cloudfront-id }}
      websocket-url: ${{ steps.cdk-outputs.outputs.websocket-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Synthesize CDK templates
        run: |
          cd infra
          npx cdk synth --quiet --all

      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          # Get API Gateway URL from CDK outputs using cdk list command
          echo "Getting CDK outputs..."
          
          # Get all outputs from CDK
          CDK_OUTPUTS=$(cdk list --all --outputs-file /tmp/cdk-outputs.json 2>&1 || true)
          
          # If cdk list fails, synthesize and extract from templates
          if [ ! -f /tmp/cdk-outputs.json ]; then
            echo "Using fallback method to extract outputs..."
            
            # Synthesize API stack and extract outputs
            API_URL=$(cdk synth ${{ env.STACK_PREFIX }}-api-stack --quiet 2>/dev/null | \
              grep -A 10 '"APIUrl"' | grep '"Value"' | \
              sed 's/.*"Value": "//' | sed 's/".*//' | head -1 || echo "")
            
            # Synthesize CDN stack and extract CloudFront ID
            CLOUDFRONT_ID=$(cdk synth ${{ env.STACK_PREFIX }}-cdn-stack --quiet 2>/dev/null | \
              grep -A 10 '"CloudFrontDistributionId"' | grep '"Value"' | \
              sed 's/.*"Value": "//' | sed 's/".*//' | head -1 || echo "")
          else
            # Parse outputs from JSON file
            API_URL=$(jq -r '.[]."${{ env.STACK_PREFIX }}-api-stack".APIUrl // empty' /tmp/cdk-outputs.json 2>/dev/null || echo "")
            CLOUDFRONT_ID=$(jq -r '.[]."${{ env.STACK_PREFIX }}-cdn-stack".CloudFrontDistributionId // empty' /tmp/cdk-outputs.json 2>/dev/null || echo "")
          fi
          
          # Ensure URL starts with https://
          if [[ -n "$API_URL" && ! "$API_URL" =~ ^https:// ]]; then
            API_URL="https://$API_URL"
          fi
          
          # Generate WebSocket URL from API URL
          WEBSOCKET_URL=""
          if [[ -n "$API_URL" ]]; then
            # Convert https:// to wss:// and add /prod/ws
            WEBSOCKET_URL=$(echo "$API_URL" | sed 's|https://|wss://|' | sed 's|/jobs.*||')/prod/ws
          fi
          
          echo "API URL: $API_URL"
          echo "WebSocket URL: $WEBSOCKET_URL"
          echo "CloudFront ID: $CLOUDFRONT_ID"
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend-bucket=${{ env.FRONTEND_BUCKET }}" >> $GITHUB_OUTPUT
          echo "cloudfront-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          echo "websocket-url=$WEBSOCKET_URL" >> $GITHUB_OUTPUT

  # ============================================
  # Job 3: Build frontend with correct API URL
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: cdk-synth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend with API URL
        env:
          VITE_API_URL: ${{ needs.cdk-synth.outputs.api-url }}
          VITE_WS_URL: ${{ needs.cdk-synth.outputs.websocket-url }}
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  # ============================================
  # Job 4: Deploy CDK infrastructure
  # ============================================
  deploy-cdk:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: [build-ecr, cdk-synth]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: |
          cd infra
          npm install
          pip install -r requirements.txt

      - name: Bootstrap CDK (if needed)
        id: cdk-bootstrap
        run: |
          cd infra
          
          # Check if CDK is already bootstrapped
          if cdk list --all 2>/dev/null; then
            echo "CDK already bootstrapped"
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          else
            echo "Bootstrapping CDK..."
            cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          fi
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Deploy CDK stacks
        run: |
          cd infra
          # Pass imageTag context to CDK for ECR image reference
          cdk deploy --all --require-approval never --concurrency 3 \
            -c imageTag=${{ needs.build-ecr.outputs.image-tag }}
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          IMAGE_TAG: ${{ needs.build-ecr.outputs.image-tag }}
          ECR_REGISTRY: ${{ needs.build-ecr.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}

  # ============================================
  # Job 5: Upload frontend to S3
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-cdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Upload to S3
        run: |
          aws s3 sync ./dist s3://${{ env.FRONTEND_BUCKET }}/ --delete
          aws s3 cp ./dist/index.html s3://${{ env.FRONTEND_BUCKET }}/ --metadata-directive REPLACE

      - name: Get CloudFront Distribution ID
        id: get-cloudfront
        run: |
          # Try to get CloudFront ID from CDN stack outputs
          CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-cdn-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$CLOUDFRONT_ID" ]; then
            echo "CloudFront Distribution ID: $CLOUDFRONT_ID"
            echo "distribution-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
            
            # Update GitHub variable if different
            CURRENT_VAR="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
            if [ "$CLOUDFRONT_ID" != "$CURRENT_VAR" ]; then
              echo "Updating CLOUDFRONT_DISTRIBUTION_ID variable..."
              gh variable set CLOUDFRONT_DISTRIBUTION_ID --body "$CLOUDFRONT_ID"
            fi
          else
            echo "Warning: Could not get CloudFront Distribution ID"
          fi

      - name: Invalidate CloudFront
        if: steps.get-cloudfront.outputs.distribution-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.get-cloudfront.outputs.distribution-id }} \
            --paths "/*"

  # ============================================
  # Job 6: Verify deployment
  # ============================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-cdk, deploy-frontend]
    steps:
      - name: Wait for deployment stabilization
        run: sleep 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway URL from CloudFormation
        id: api-endpoint
        run: |
          # Get API URL from CloudFormation outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_PREFIX }}-api-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`APIUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$API_URL" ]; then
            # Try alternative output name
            API_URL=$(aws cloudformation describe-stacks \
              --stack-name ${{ env.STACK_PREFIX }}-api-stack \
              --query 'Stacks[0].Outputs[?OutputKey==`APIGatewayEndpoint`].OutputValue' \
              --output text 2>/dev/null || echo "")
          fi
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          # Get API URL from the api-endpoint step
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "Warning: Could not get API URL from CloudFormation outputs"
            exit 0  # Don't fail, just skip
          fi
          
          # The API URL already includes /jobs, we need to get the base URL
          BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
          HEALTH_URL="$BASE_URL/prod/health"
          echo "Checking health endpoint: $HEALTH_URL"
          
          # Try health check with timeout
          STATUS_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "503")
          echo "Health check status: $STATUS_CODE"
          
          if [ "$STATUS_CODE" != "200" ]; then
            echo "Warning: Health check returned $STATUS_CODE"
            # Don't fail the job, just warn
          fi
        continue-on-error: true

      - name: Smoke test - Create job
        run: |
          # Get API URL from the api-endpoint step
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "Warning: Could not get API URL from CloudFormation outputs"
            exit 0  # Don't fail, just skip
          fi
          
          # The API URL already includes /jobs, we need to get the base URL
          BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
          API_BASE_URL="$BASE_URL/prod"
          
          echo "Testing API at: $API_BASE_URL"
          
          # Login and get token
          TOKEN=$(curl -s -X POST "$API_BASE_URL/auth/token" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "test-user-001"}' | jq -r '.access_token')
          
          if [ "$TOKEN" != "null" ] && [ -n "$TOKEN" ]; then
            echo "✓ Authentication successful"
            
            # Create a test job
            JOB_RESPONSE=$(curl -s -X POST "$API_BASE_URL/jobs" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"report_type": "sales_report", "date_range": "last_7_days", "format": "pdf"}')
            
            JOB_ID=$(echo $JOB_RESPONSE | jq -r '.job_id')
            if [ "$JOB_ID" != "null" ] && [ -n "$JOB_ID" ]; then
              echo "✓ Job creation successful: $JOB_ID"
            else
              echo "Job response: $JOB_RESPONSE"
              exit 1
            fi
          else
            echo "✗ Authentication failed"
            exit 1
          fi

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Deployed" >> $GITHUB_STEP_SUMMARY
          
          # Get API URL from the api-endpoint step
          API_URL="${{ steps.api-endpoint.outputs.api-url }}"
          if [ -n "$API_URL" ] && [ "$API_URL" != "null" ]; then
            # Extract base URL from the API URL (remove /jobs suffix)
            BASE_URL=$(echo "$API_URL" | sed 's|/jobs.*||')
            echo "- **API Base URL**: $BASE_URL/prod" >> $GITHUB_STEP_SUMMARY
            echo "- **Jobs Endpoint**: $API_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **API URL**: Could not retrieve from CloudFormation" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "- **Frontend URL**: https://$(aws cloudfront get-distribution --id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --query 'Distribution.DomainName' --output text 2>/dev/null || echo ${{ env.FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com)" >> $GITHUB_STEP_SUMMARY
          echo "- **ECR Repository**: ${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest**: ${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ needs.build-ecr.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
